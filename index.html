<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Multiple Time Zones</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Global Time Zones</h1>
        <div class="controls">
            <button id="add-timezone-btn">+ Add Time Zone</button>
            <button id="toggle-format-btn">24-Hour Format</button>
        </div>
        
        <div class="timezone-selector" id="timezone-selector" style="display: none;">
            <select id="timezone-list">
                <option value="">Select a timezone</option>
            </select>
            <button id="confirm-timezone-btn">Add</button>
            <button id="cancel-timezone-btn">Cancel</button>
        </div>

        <div class="clocks-container" id="clocks-container">
            <!-- Clocks will be dynamically added here -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
